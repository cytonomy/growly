<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growly</title>
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden; background: #111;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    #face-toggle, #mode-toggle {
      position: fixed;
      right: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: #eee;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 4px;
      font-family: monospace;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }
    #face-toggle {
      top: 12px;
      padding: 8px 12px;
      font-size: 12px;
    }
    #mode-toggle {
      top: 50px;
      padding: 6px 10px;
      font-size: 11px;
    }
    #face-toggle:hover, #mode-toggle:hover { background: rgba(0, 0, 0, 0.8); }
    #face-toggle.on { border-color: rgba(0, 255, 120, 0.6); color: rgb(120, 255, 180); }
    #mode-toggle.gaze { border-color: rgba(120, 200, 255, 0.6); color: rgb(150, 200, 255); }
    #mode-toggle[hidden] { display: none; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
</head>
<body>
  <button id="face-toggle" aria-label="Toggle face tracking overlay">Face tracking: OFF</button>
  <button id="mode-toggle" aria-label="Switch between face-position and iris-gaze tracking" hidden>Mode: Face</button>
  <script>
    var v = Date.now();
    document.write('<script src="config.js?v=' + v + '"><\/script>');
    document.write('<script src="sketch.js?v=' + v + '"><\/script>');
  </script>
</body>
</html>
